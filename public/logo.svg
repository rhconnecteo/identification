<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#logoGrad)" rx="16"/>
  
  <!-- Card Body -->
  <rect x="30" y="40" width="140" height="120" fill="none" stroke="#ffffff" stroke-width="5" rx="8"/>
  
  <!-- Portrait Circle -->
  <circle cx="60" cy="75" r="18" fill="none" stroke="#ffffff" stroke-width="4"/>
  <circle cx="60" cy="68" r="6" fill="#ffffff"/>
  <path d="M 54 78 Q 60 82 66 78" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Information Lines -->
  <line x1="96" y1="60" x2="155" y2="60" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="96" y1="75" x2="155" y2="75" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="96" y1="90" x2="140" y2="90" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Security Elements (dots) -->
  <circle cx="40" cy="145" r="4" fill="#ffffff"/>
  <circle cx="70" cy="145" r="4" fill="#ffffff"/>
  <circle cx="100" cy="145" r="4" fill="#ffffff"/>
  <circle cx="130" cy="145" r="4" fill="#ffffff"/>
  <circle cx="160" cy="145" r="4" fill="#ffffff"/>
</svg>